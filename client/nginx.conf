server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — required when proxy_pass uses a variable so
    # Nginx re-resolves the upstream hostname at request time instead of
    # caching the IP once at startup (stale after container restarts).
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Proxy /api and /uploads to the backend container.
    # BACKEND_URL is replaced at container startup via envsubst.
    # Using set $backend forces runtime DNS resolution via the resolver above.
    # proxy_ssl_server_name sends the correct SNI in the TLS handshake so
    # Traefik can match the right backend when BACKEND_URL is an HTTPS domain.
    location /api/ {
        set $backend ${BACKEND_URL};
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        # Send the backend domain as Host so Traefik routes to the correct backend
        # service (matching on api-support.wisright.com router rule).
        # Better Auth derives cookie domain from baseURL (BETTER_AUTH_URL), not
        # the Host header, so this does not affect session cookie behaviour.
        proxy_set_header   Host              $proxy_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Hardcode https: Traefik terminates TLS before forwarding to Nginx, so
        # $scheme would be "http" even though the original request used HTTPS.
        proxy_set_header   X-Forwarded-Proto https;
        # Allow large file uploads (images)
        client_max_body_size 20M;
        # Increase proxy buffers to handle large auth/session headers from upstream
        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;
    }

    location ^~ /uploads/ {
        set $backend ${BACKEND_URL};
        proxy_pass         $backend;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header   Host              $proxy_host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
